<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    body { margin: 0; padding: 0; background: #FAF9F6; overflow: hidden; }
    .card {
        width: 1200px; height: 630px;
        background: #FAF9F6;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        position: relative;
    }
    .card::before {
        content: ''; position: absolute;
        width: 400px; height: 400px; border-radius: 50%;
        background: radial-gradient(circle, rgba(210,105,30,0.05) 0%, transparent 70%);
        top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .candle { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }
    .flame {
        width: 16px; height: 24px;
        background: linear-gradient(180deg, #F4A020 0%, #D2691E 60%, #C45A1A 100%);
        border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
        margin-bottom: 1px;
        box-shadow: 0 0 12px rgba(244,160,32,0.4), 0 0 24px rgba(210,105,30,0.15);
    }
    .wick { width: 2px; height: 8px; background: #8B7355; }
    .stick { width: 4px; height: 32px; background: linear-gradient(180deg, #D4C5B9, #C4B5A9); border-radius: 0 0 2px 2px; }
    .name {
        font-family: 'Cormorant Garamond', serif;
        font-size: 72px; font-weight: 500; color: #3E2723;
        letter-spacing: 0.06em; margin-top: 12px; line-height: 1;
    }
    .hebrew {
        font-size: 22px; color: #8B7355;
        margin-top: 6px; direction: rtl;
    }
    .divider { width: 50px; height: 2px; background: #D2691E; margin-top: 10px; border-radius: 2px; }
    .tagline {
        font-family: 'Cormorant Garamond', serif;
        font-size: 22px; font-style: italic; color: #D2691E;
        margin-top: 10px; letter-spacing: 0.02em;
    }
    .features {
        font-family: 'Crimson Pro', serif;
        font-size: 15px; color: #8B7355;
        margin-top: 16px; letter-spacing: 0.03em;
    }
    .url {
        font-family: 'Crimson Pro', serif;
        font-size: 16px; color: #D2691E;
        margin-top: 20px; letter-spacing: 0.03em;
    }
</style>
</head>
<body>
<div class="card">
    <div class="candle">
        <div class="flame"></div>
        <div class="wick"></div>
        <div class="stick"></div>
    </div>
    <div class="name">NESHAMA</div>
    <div class="hebrew" dir="rtl">נְשָׁמָה</div>
    <div class="divider"></div>
    <div class="tagline">Every Soul Remembered</div>
    <div class="features">Toronto &amp; Montreal Jewish Obituaries &nbsp;&middot;&nbsp; Shiva Support &nbsp;&middot;&nbsp; Community</div>
    <div class="url">neshama.ca</div>
</div>
</body>
</html>
